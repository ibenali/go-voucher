services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend/db:/app/db
    environment:
      PORT: 4000
      DB_PATH: ./db/vouchers.db
      JWT_SECRET: change_this_secret_in_production

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
